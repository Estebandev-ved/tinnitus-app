name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build web app
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_AZURE_ENDPOINT: ${{ secrets.VITE_AZURE_ENDPOINT }}
          VITE_AZURE_DEPLOYMENT: ${{ secrets.VITE_AZURE_DEPLOYMENT }}

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/tinnitoff-release.jks

      - name: Create keystore.properties
        run: |
          cat > android/keystore.properties <<EOF
          TINNITOFF_KEYSTORE=../tinnitoff-release.jks
          TINNITOFF_KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}
          TINNITOFF_KEY_ALIAS=${{ secrets.KEY_ALIAS }}
          TINNITOFF_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Build release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --stacktrace --info

      - name: Rename APK for release
        run: cp android/app/build/outputs/apk/release/app-release.apk tinnitoff-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tinnitoff-release
          path: tinnitoff-release.apk
          retention-days: 30

      - name: Get release date
        id: date
        run: echo "date=$(date +'%Y.%m.%d')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.date.outputs.date }}-${{ github.run_number }}
          name: TinnitOff v${{ steps.date.outputs.date }}
          body: |
            ## TinnitOff — Beta Android

            Descarga e instala el APK en tu dispositivo Android.

            ### Instalación
            1. Descarga `tinnitoff-release.apk`
            2. En tu Android: Ajustes → Seguridad → Fuentes desconocidas ✓
            3. Abre el archivo y toca **Instalar**
          files: tinnitoff-release.apk
          token: ${{ secrets.GITHUB_TOKEN }}
